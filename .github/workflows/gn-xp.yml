name: GN XP Multi-Platform Build

on:
  workflow_dispatch:
  pull_request:

# Cancel a superseded run when new commits are pushed to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: only checkout needs the token. Artifact upload uses the
# runtime token, not GITHUB_TOKEN scopes. Widen to contents:write only if this
# workflow later publishes releases.
permissions:
  contents: read

# Update Ninja/MinGW version here
env:
  NINJA_BASE_URL: https://github.com/Alex313031/ninja-xp/releases/download/v1.13.2xp4
  MINGW_BASE_URL: https://github.com/Alex313031/mingw-build/releases/download/20260717

jobs:
  build:
    name: Build GN XP x86/x64
    # Built on Ubuntu 22.04 (glibc 2.35). The Windows zips are statically linked
    # PE binaries, independent of the host glibc. The Linux zips, however, are
    # dynamically linked against the runner's glibc 2.35 and need glibc >= 2.35
    # at runtime -- rebuild on an older base if you need wider Linux reach.
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        # Full history + tags: gen.py derives the build number from
        # `git describe --match initial-commit`, which needs that tag and the
        # commit history. actions/checkout does a shallow, tag-less clone by
        # default, which makes git describe fail with exit 128.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential g++-multilib python3 wget zip unzip

      - name: Download and set up Ninja XP
        # Use our own Ninja (ninja-build is intentionally not installed via apt):
        # unzip it into a dedicated dir and prepend that to PATH for subsequent
        # steps. Writing to $GITHUB_PATH prepends, so this ninja shadows any system copy.
        run: |
          wget "${NINJA_BASE_URL}/ninja_linux.zip"
          mkdir -p "$HOME/ninja-bin"
          unzip -o ninja_linux.zip -d "$HOME/ninja-bin"
          chmod +x "$HOME/ninja-bin/ninja"
          rm -f ninja_linux.zip
          "$HOME/ninja-bin/ninja" --version   # fail fast if it can't run here
          echo "$HOME/ninja-bin" >> "$GITHUB_PATH"

      - name: Download MinGW
        # Use our own MinGW fork for compiling Windows builds
        run: |
          wget "${MINGW_BASE_URL}/mingw_gcc_linux_i686.zip"
          wget "${MINGW_BASE_URL}/mingw_gcc_linux_x64.zip"
          unzip -o mingw_gcc_linux_i686.zip -d "$HOME"
          unzip -o mingw_gcc_linux_x64.zip -d "$HOME"
          rm -f mingw_gcc_linux_i686.zip mingw_gcc_linux_x64.zip
          # Fail fast if either cross-compiler can't run on this host.
          "$HOME/i686/bin/i686-w64-mingw32-gcc" --version
          "$HOME/x64/bin/x86_64-w64-mingw32-gcc" --version
          echo "$HOME/x64/bin" >> "$GITHUB_PATH"
          echo "$HOME/i686/bin" >> "$GITHUB_PATH"

      - name: Build for Linux/Windows
        # On pull_request the checkout HEAD is an ephemeral merge commit, so take
        # the PR head SHA from the event; fall back to github.sha for other events.
        run: |
          ./build.sh --all
          SHA=${{ github.event.pull_request.head.sha || github.sha }}
          echo "SHA_SHORT=${SHA:0:6}" >> "$GITHUB_ENV"

      - name: Upload toolchain zips
        uses: actions/upload-artifact@v4
        with:
          name: gn-xp_${{ env.SHA_SHORT}}
          path: gn_*.zip
          if-no-files-found: error
